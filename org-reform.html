<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gartner 2026 — 組織改革重點分析</title>
<!-- Base fonts (always needed) -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Language fonts loaded on demand by JS -->
<script>
(function(){
  var loaded = {};
  var fonts = {
    ja: 'family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700;900',
    fr: 'family=Playfair+Display:wght@400;700;900',
    th: 'family=Noto+Sans+Thai:wght@300;400;500;700;900&family=Noto+Serif+Thai:wght@400;700;900'
  };
  window.__loadLangFont = function(lang) {
    if (loaded[lang] || !fonts[lang]) return;
    loaded[lang] = true;
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?' + fonts[lang] + '&display=swap';
    document.head.appendChild(link);
  };
})();
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --washi: #F6F2EC;
  --washi-warm: #EDE7DD;
  --kinu: #FDFBF8;
  --sumi: #1C1915;
  --sumi-soft: #3D3830;
  --sumi-muted: #8A8279;
  --shu: #BE3134;
  --shu-light: #D4514F;
  --shu-ghost: rgba(190,49,52,0.06);
  --shu-pale: rgba(190,49,52,0.12);
  --ai: #2B6A72;
  --ai-ghost: rgba(43,106,114,0.07);
  --matcha: #4E7A52;
  --matcha-ghost: rgba(78,122,82,0.07);
  --kincha: #C48E3C;
  --kincha-ghost: rgba(196,142,60,0.08);
  --border: #DDD7CC;
  --border-light: #E8E3DA;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.08);
}

html {
  scroll-behavior: smooth;
  background: var(--washi);
  color: var(--sumi);
  font-family: 'Noto Sans TC', 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}

body { overflow-x: hidden; }

/* ── Noise texture overlay ── */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 499;
  pointer-events: none; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* ── Scroll progress ── */
#scroll-progress {
  position: fixed; top: 0; left: 0; height: 3px;
  background: var(--shu); z-index: 1000;
  transform-origin: left; transition: none;
}

/* ── Sticky Nav ── */
.sticky-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  padding: 0 clamp(24px, 4vw, 60px); height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(246,242,236,0.85); backdrop-filter: blur(16px) saturate(1.2);
  border-bottom: 1px solid transparent;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
.sticky-nav.scrolled {
  border-bottom-color: var(--border);
  box-shadow: 0 1px 12px rgba(0,0,0,0.04);
}
.nav-brand {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(0.9rem, 1.1vw, 1.05rem); font-weight: 700;
  color: var(--sumi);
}
/* Desktop: nav-links is a fixed bar just under the sticky-nav */
.nav-links {
  position: fixed; top: 60px; left: 0; right: 0; z-index: 499;
  display: flex; gap: 6px; justify-content: center; flex-wrap: nowrap;
  padding: 8px clamp(24px, 4vw, 60px);
  background: rgba(246,242,236,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-light);
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-pill {
  padding: 6px 16px; border-radius: 50px; border: none; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: clamp(0.72rem, 0.85vw, 0.82rem); font-weight: 500;
  color: var(--sumi-muted); background: transparent;
  transition: all 0.25s ease;
}
.nav-pill:hover { color: var(--sumi); background: var(--washi-warm); }
.nav-pill:focus-visible { outline: 2px solid var(--shu); outline-offset: 2px; }
.nav-pill.active { color: var(--shu); background: var(--shu-ghost); font-weight: 700; }

/* ── Hero ── */
.hero-section {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 120px clamp(24px, 6vw, 80px) 80px;
  position: relative; overflow: hidden;
}
.hero-section::before {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: min(600px, 70vw); height: min(600px, 70vw);
  border: 1px solid var(--border); border-radius: 50%; opacity: 0.4;
}
.hero-section::after {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: min(420px, 50vw); height: min(420px, 50vw);
  border: 1px solid var(--border); border-radius: 50%; opacity: 0.25;
}
.hero-tag {
  font-size: clamp(0.8rem, 1vw, 0.95rem);
  letter-spacing: 0.25em; color: var(--shu);
  font-weight: 500; margin-bottom: 28px; position: relative; z-index: 1;
}
.hero-title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(3rem, 6.5vw, 5.8rem);
  font-weight: 900; line-height: 1.2; letter-spacing: 0.03em;
  color: var(--sumi); margin-bottom: 28px; position: relative; z-index: 1;
}
.hero-sub {
  font-size: clamp(1.15rem, 1.8vw, 1.65rem);
  color: var(--sumi-muted); font-weight: 400; margin-bottom: 16px;
  position: relative; z-index: 1;
}
.hero-meta {
  font-size: clamp(0.85rem, 1vw, 1rem);
  color: var(--sumi-muted); position: relative; z-index: 1;
}
.hero-line {
  width: 1px; height: 80px; background: var(--border);
  margin-top: 48px; position: relative; z-index: 1;
  transform-origin: top; animation: growDown 1.5s ease 1s both;
}
@keyframes growDown { from { transform: scaleY(0); } to { transform: scaleY(1); } }

/* ── Section ── */
.content-section {
  padding: clamp(80px, 12vh, 140px) clamp(24px, 6vw, 80px);
  max-width: 1100px; margin: 0 auto;
}
.section-divider {
  width: 40px; height: 3px; background: var(--shu);
  margin-bottom: 20px; border-radius: 2px;
}
.section-tag {
  font-size: clamp(0.82rem, 1vw, 0.95rem);
  letter-spacing: 0.2em; color: var(--shu); font-weight: 500;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(2.2rem, 4vw, 3.6rem);
  font-weight: 900; line-height: 1.3; letter-spacing: 0.01em;
  color: var(--sumi); margin-bottom: clamp(28px, 4vh, 48px);
}
.section-body {
  font-size: clamp(1.2rem, 1.5vw, 1.5rem);
  line-height: 1.9; color: var(--sumi-soft); max-width: 48em;
}
.section-body strong { color: var(--sumi); font-weight: 700; }
.section-body p { margin-bottom: 1em; }

/* ── Stat Cards ── */
.stat-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
  gap: clamp(16px, 2vw, 24px); margin: clamp(28px, 4vh, 48px) 0;
}
.stat-card {
  background: var(--kinu); border: 1px solid var(--border-light);
  border-radius: 8px; padding: clamp(28px, 3vw, 40px);
  box-shadow: var(--shadow-sm);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), box-shadow 0.35s ease;
  position: relative; overflow: hidden;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 4px;
}
.stat-card--shu::before { background: var(--shu); }
.stat-card--ai::before { background: var(--ai); }
.stat-card--matcha::before { background: var(--matcha); }
.stat-card--kincha::before { background: var(--kincha); }
.stat-num {
  font-family: 'Inter', sans-serif; font-weight: 900;
  font-size: clamp(2.8rem, 5vw, 4.2rem);
  font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 10px;
}
.stat-card--shu .stat-num { color: var(--shu); }
.stat-card--ai .stat-num { color: var(--ai); }
.stat-card--matcha .stat-num { color: var(--matcha); }
.stat-card--kincha .stat-num { color: var(--kincha); }
.stat-label {
  font-size: clamp(1rem, 1.25vw, 1.25rem);
  color: var(--sumi-soft); line-height: 1.6;
}

/* ── Key Message ── */
.key-message {
  margin: clamp(28px, 4vh, 48px) 0;
  padding: clamp(24px, 3vw, 36px);
  border-left: 4px solid var(--shu);
  background: var(--shu-ghost); border-radius: 0 8px 8px 0;
  font-size: clamp(1.2rem, 1.5vw, 1.5rem);
  font-weight: 700; line-height: 1.8; color: var(--sumi);
}

/* ── Duo Cards ── */
.duo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(16px, 2.5vw, 28px); margin: clamp(28px, 4vh, 44px) 0; }
@media (max-width: 720px) { .duo-grid { grid-template-columns: 1fr; } }
.duo-card {
  background: var(--kinu); border: 1px solid var(--border-light);
  border-radius: 8px; padding: clamp(24px, 3vw, 36px);
  box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
}
.duo-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; }
.duo-card--stop::before { background: var(--shu); }
.duo-card--go::before { background: var(--matcha); }
.duo-card h3 {
  font-size: clamp(1.15rem, 1.4vw, 1.4rem); font-weight: 700;
  margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
}
.duo-card--stop h3 { color: var(--shu); }
.duo-card--go h3 { color: var(--matcha); }
.duo-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
.duo-list li {
  font-size: clamp(1.08rem, 1.3vw, 1.3rem); line-height: 1.8;
  color: var(--sumi-soft); padding-left: 26px; position: relative;
}
.duo-list li strong { color: var(--sumi); }
.duo-card--stop .duo-list li::before { content: '\2717'; position: absolute; left: 0; color: var(--shu); font-weight: 700; }
.duo-card--go .duo-list li::before { content: '\2713'; position: absolute; left: 0; color: var(--matcha); font-weight: 700; }

/* ── Table Row ── */
.info-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: clamp(12px, 1.8vw, 20px); margin: clamp(20px, 3vh, 36px) 0;
}
@media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
.info-cell {
  background: var(--kinu); border: 1px solid var(--border-light);
  border-radius: 8px; padding: clamp(20px, 2.5vw, 30px);
  box-shadow: var(--shadow-sm);
}
.info-cell-label {
  font-size: clamp(0.88rem, 1vw, 1rem);
  color: var(--sumi-muted); letter-spacing: 0.1em; font-weight: 500;
  margin-bottom: 8px;
}
.info-cell-value {
  font-size: clamp(1.15rem, 1.4vw, 1.4rem);
  color: var(--sumi); line-height: 1.65; font-weight: 500;
}
.info-cell-value .accent { color: var(--shu); font-weight: 800; font-family: 'Inter', sans-serif; }

/* ── Takeaway Cards ── */
.takeaway-list { display: flex; flex-direction: column; gap: clamp(14px, 2vh, 22px); }
.takeaway-card {
  display: flex; gap: clamp(18px, 2.5vw, 28px); align-items: flex-start;
  background: var(--kinu); border: 1px solid var(--border-light);
  border-left: 4px solid var(--shu);
  border-radius: 8px; padding: clamp(22px, 2.8vw, 34px);
  box-shadow: var(--shadow-sm);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.takeaway-card:hover { transform: translateX(4px); box-shadow: var(--shadow-md); }
.takeaway-num {
  flex-shrink: 0; width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  background: var(--shu-ghost); border-radius: 8px;
  font-family: 'Inter', sans-serif; font-size: 1.6rem;
  font-weight: 900; color: var(--shu);
}
.takeaway-card h3 {
  font-size: clamp(1.25rem, 1.55vw, 1.5rem); font-weight: 700;
  margin-bottom: 6px; color: var(--sumi);
}
.takeaway-card p {
  font-size: clamp(1.05rem, 1.3vw, 1.3rem);
  line-height: 1.8; color: var(--sumi-soft);
}

/* ── Closing ── */
.closing-section {
  min-height: 70vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: clamp(80px, 12vh, 140px) clamp(24px, 6vw, 80px);
  position: relative;
}
.closing-section::before {
  content: ''; position: absolute; top: 0;
  left: 50%; transform: translateX(-50%);
  width: 60px; height: 1px; background: var(--border);
}
.closing-text {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(1.8rem, 3.5vw, 3.2rem);
  font-weight: 700; line-height: 1.65; max-width: 14em;
  color: var(--sumi);
}
.closing-text .hl { color: var(--shu); }
.closing-src {
  margin-top: 48px; font-size: clamp(0.82rem, 0.95vw, 0.92rem);
  color: var(--sumi-muted);
}

/* ── Source line ── */
.src-line {
  margin-top: clamp(20px, 3vh, 36px);
  font-size: clamp(0.78rem, 0.9vw, 0.88rem);
  color: var(--sumi-muted);
}

/* ── Reveal Animation ── */
.reveal {
  opacity: 0; transform: translateY(28px);
  transition: opacity 0.7s cubic-bezier(0.25,0.1,0.25,1), transform 0.7s cubic-bezier(0.25,0.1,0.25,1);
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }

/* ── Full-width divider between sections ── */
.section-sep {
  max-width: 1100px; margin: 0 auto;
  padding: 0 clamp(24px, 6vw, 80px);
}
.section-sep-line {
  height: 1px; background: var(--border);
}

/* ── Language Toggle ── */
.lang-toggle {
  display: flex; gap: 0; border: 1px solid var(--border); border-radius: 50px; overflow: hidden;
  background: var(--kinu);
}
.lang-btn {
  padding: 6px 18px; border: none; cursor: pointer;
  font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif;
  font-size: clamp(0.75rem, 0.88vw, 0.85rem); font-weight: 500;
  color: var(--sumi-muted); background: transparent;
  transition: all 0.25s ease;
}
.lang-btn.active { color: var(--kinu); background: var(--sumi); font-weight: 700; }
.lang-btn:not(.active):hover { color: var(--sumi); background: var(--washi-warm); }
.lang-btn:focus-visible { outline: 2px solid var(--shu); outline-offset: 2px; }

/* ── JP font override ── */
.lang-ja { font-family: 'Noto Sans JP', 'Inter', sans-serif; }
.lang-ja .hero-title,
.lang-ja .section-title,
.lang-ja .closing-text { font-family: 'Noto Serif JP', serif; }

/* ── FR font override ── */
.lang-fr { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
.lang-fr .hero-title,
.lang-fr .section-title,
.lang-fr .closing-text { font-family: 'Playfair Display', serif; }

/* ── TH font override ── */
.lang-th { font-family: 'Noto Sans Thai', 'Inter', sans-serif; line-height: 2; }
.lang-th .hero-title,
.lang-th .section-title,
.lang-th .closing-text { font-family: 'Noto Serif Thai', serif; }

/* ── Responsive Nav ── */
@media (max-width: 1100px) {
  .nav-pill { white-space: nowrap; flex-shrink: 0; }
}
@media (max-width: 720px) {
  /* Top bar: brand left, lang toggle right — compact single row */
  .sticky-nav {
    height: 48px; padding: 0 12px;
    gap: 8px; justify-content: space-between; align-items: center;
  }
  .nav-brand { font-size: 0.85rem; flex-shrink: 0; }
  .lang-toggle { flex-shrink: 0; }
  .lang-btn { padding: 6px 10px; min-height: 36px; font-size: 0.72rem; }
  /* Section pills move to bottom of screen */
  .nav-links {
    top: auto; bottom: 0;
    border-bottom: none; border-top: 1px solid var(--border);
    padding: 6px 12px; gap: 4px; justify-content: flex-start;
  }
  .nav-pill {
    padding: 8px 14px; min-height: 40px;
    font-size: 0.78rem;
  }
  /* Shift fixed elements above bottom nav */
  .back-top { bottom: 64px; }
  .kbd-hint { bottom: 64px; }
  /* Footer room for bottom nav */
  .site-footer { padding-bottom: 70px; }
  /* Hero accounts for smaller top bar */
  .hero-section { padding-top: 80px; }
}

/* ── Tooltip ── */
.tip {
  position: relative; cursor: help;
  border-bottom: 1px dotted var(--shu); color: inherit;
}
.tip .tip-text {
  visibility: hidden; opacity: 0;
  position: absolute; bottom: calc(100% + 10px); left: 50%;
  transform: translateX(-50%); z-index: 600;
  background: var(--sumi); color: var(--kinu);
  padding: 10px 16px; border-radius: 8px;
  font-size: clamp(0.82rem, 0.95vw, 0.92rem); font-weight: 400;
  line-height: 1.6; width: max-content; max-width: 300px;
  box-shadow: var(--shadow-lg);
  transition: opacity 0.2s ease, visibility 0.2s ease;
  pointer-events: none;
}
.tip .tip-text::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent; border-top-color: var(--sumi);
}
.tip:hover .tip-text,
.tip:focus-within .tip-text,
.tip:focus .tip-text { visibility: visible; opacity: 1; }
.tip:focus { outline: 2px solid var(--shu); outline-offset: 2px; border-radius: 2px; }

/* ── Back to Top ── */
.back-top {
  position: fixed; bottom: 28px; right: 28px; z-index: 500;
  width: 48px; height: 48px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--kinu);
  box-shadow: var(--shadow-md); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; color: var(--sumi-soft);
  opacity: 0; transform: translateY(12px);
  transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
  pointer-events: none;
}
.back-top.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.back-top:hover { background: var(--washi-warm); color: var(--sumi); }
.back-top:focus-visible { outline: 2px solid var(--shu); outline-offset: 2px; }

/* ── Highlight Section (full-width accent band) ── */
.section--highlight {
  background: var(--shu-ghost);
  border-top: 1px solid var(--shu-pale);
  border-bottom: 1px solid var(--shu-pale);
  padding: clamp(60px, 10vh, 120px) clamp(24px, 6vw, 80px);
  max-width: 100%; margin: 0;
}
.section--highlight .content-inner {
  max-width: 1100px; margin: 0 auto;
}
.section--highlight .section-divider { background: var(--shu); width: 60px; }
.section--highlight .key-message {
  background: rgba(190,49,52,0.08); border-left-width: 5px;
  font-size: clamp(1.35rem, 1.7vw, 1.7rem);
}

/* ── Side-by-Side Layout ── */
.split {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: clamp(32px, 4vw, 56px); align-items: start;
  margin: clamp(28px, 4vh, 48px) 0;
}
@media (max-width: 800px) { .split { grid-template-columns: 1fr; } }
.split .stat-grid { margin: 0; }

/* ── Keyboard hint ── */
.kbd-hint {
  position: fixed; bottom: 28px; left: 28px; z-index: 500;
  font-size: 0.75rem; color: var(--sumi-muted);
  opacity: 0; transition: opacity 0.5s ease;
}
.kbd-hint.show { opacity: 1; }
.kbd-hint kbd {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--kinu);
  font-family: 'Inter', sans-serif; font-size: 0.7rem;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

/* ── Horizontal Comparison (alternate duo layout for S6) ── */
.compare-stack { display: flex; flex-direction: column; gap: clamp(16px, 2.5vh, 24px); margin: clamp(28px, 4vh, 44px) 0; }
.compare-row {
  display: grid; grid-template-columns: auto 1fr; gap: 0;
  background: var(--kinu); border: 1px solid var(--border-light);

/* ── Reveal hook ── */
function useReveal(threshold = 0.15) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); obs.unobserve(el); }
    }, { threshold, rootMargin: '0px 0px -40px 0px' });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}
function Reveal({ children, className = '', delay = 0 }) {
  const ref = useReveal();
  return <div ref={ref} className={`reveal ${delay ? 'reveal-delay-'+delay : ''} ${className}`}>{children}</div>;
}

/* ── Counter ── */
function Counter({ end, suffix = '', prefix = '', unit = '', duration = 1800 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const numEnd = parseFloat(String(end).replace(/[^0-9.]/g, ''));
        const t0 = performance.now();
        const step = (now) => {
          const t = Math.min((now - t0) / duration, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          setVal(Math.round(ease * numEnd * 10) / 10);
          if (t < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }
    }, { threshold: 0.3 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [end, duration]);
  const display = Number.isInteger(parseFloat(end)) ? Math.round(val) : val.toFixed(1);
  return <span ref={ref}>{prefix}{display}{suffix}{unit}</span>;
}

/* ── HTML renderer ── */
function Html({ html }) { return <div dangerouslySetInnerHTML={{__html: html}} />; }

/* ── Tooltip component ── */
function Tip({ term, lang, children }) {
  const g = GLOSSARY[lang] || GLOSSARY.zh;
  const text = g[term];
  if (!text) return <>{children}</>;
  const id = 'tip-' + term;
  return <span className="tip" tabIndex={0} role="button" aria-describedby={id}>
    {children}<span className="tip-text" id={id} role="tooltip">{text}</span>
  </span>;
}

/* ── Back to Top ── */
function BackToTop({ show, behavior }) {
  return <button className={`back-top ${show ? 'show' : ''}`}
    onClick={() => window.scrollTo({ top: 0, behavior: behavior || 'smooth' })}
    aria-label="Back to top">{'\u2191'}</button>;
}

/* ── Nav IDs ── */
const NAV_IDS = ['hero','sec-1','sec-2','sec-3','sec-4','sec-5','sec-6','sec-7','sec-8'];

function App() {
  const [lang, _setLang] = useState('zh');
  const setLang = useCallback((l) => {
    if (window.__loadLangFont) window.__loadLangFont(l);
    const langMap = { zh: 'zh-Hant', ja: 'ja', fr: 'fr', th: 'th' };
    document.documentElement.lang = langMap[l] || 'zh-Hant';
    _setLang(l);
  }, []);
  const [activeNav, setActiveNav] = useState('hero');
  const [scrolled, setScrolled] = useState(false);
  const [showTop, setShowTop] = useState(false);
  const [showKbd, setShowKbd] = useState(false);
  const t = T[lang];

  /* keyboard nav */
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowDown' || e.key === 'j') {
        e.preventDefault();
        const idx = NAV_IDS.indexOf(activeNav);
        if (idx < NAV_IDS.length - 1) document.getElementById(NAV_IDS[idx+1])?.scrollIntoView({ behavior: scrollBehavior });
      } else if (e.key === 'ArrowUp' || e.key === 'k') {
        e.preventDefault();
        const idx = NAV_IDS.indexOf(activeNav);
        if (idx > 0) document.getElementById(NAV_IDS[idx-1])?.scrollIntoView({ behavior: scrollBehavior });
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [activeNav, scrollBehavior]);

  /* Show keyboard hint on first scroll, dismiss after 5s */
  const kbdShown = useRef(false);
  useEffect(() => {
    const onFirstScroll = () => {
      if (!kbdShown.current && window.scrollY > 100) {
        kbdShown.current = true;
        setShowKbd(true);
        setTimeout(() => setShowKbd(false), 5000);
        window.removeEventListener('scroll', onFirstScroll);
      }
    };
    window.addEventListener('scroll', onFirstScroll, { passive: true });
    return () => window.removeEventListener('scroll', onFirstScroll);
  }, []);

  useEffect(() => {
    const onScroll = () => {
      const st = window.scrollY;
      setShowTop(st > window.innerHeight);
      setScrolled(st > 30);
      const h = document.documentElement.scrollHeight - window.innerHeight;
      document.getElementById('scroll-progress').style.width = (h > 0 ? (st/h)*100 : 0) + '%';
      const secs = NAV_IDS.map(id => document.getElementById(id)).filter(Boolean);
      for (let i = secs.length-1; i >= 0; i--) {
        if (secs[i].getBoundingClientRect().top < window.innerHeight * 0.4) { setActiveNav(NAV_IDS[i]); break; }
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const scrollBehaviorRef = useRef(window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'smooth');
  const scrollBehavior = scrollBehaviorRef.current;
  const go = (id) => document.getElementById(id)?.scrollIntoView({ behavior: scrollBehavior });

  return <div className={lang !== 'zh' ? 'lang-'+lang : ''}>
    <nav className={`sticky-nav ${scrolled ? 'scrolled' : ''}`} aria-label="Section navigation">
      <div className="nav-brand">Gartner 2026</div>
      <div className="lang-toggle">
        <button className={`lang-btn ${lang==='zh'?'active':''}`} onClick={()=>setLang('zh')}>中文</button>
        <button className={`lang-btn ${lang==='ja'?'active':''}`} onClick={()=>setLang('ja')}>日本語</button>
        <button className={`lang-btn ${lang==='fr'?'active':''}`} onClick={()=>setLang('fr')}>Français</button>
        <button className={`lang-btn ${lang==='th'?'active':''}`} onClick={()=>setLang('th')}>ไทย</button>
      </div>
    </nav>
    <div className="nav-links" role="navigation" aria-label="Sections">
      {NAV_IDS.map((id,i) => (
        <button key={id} className={`nav-pill ${activeNav===id?'active':''}`} onClick={()=>go(id)}>{t.nav[i]}</button>
      ))}
    </div>

    <main>
    {/* Hero */}
    <section className="hero-section" id="hero" aria-label={t.nav[0]}>
      <Reveal><div className="hero-tag">{t.heroTag}</div></Reveal>
      <Reveal delay={1}><h1 className="hero-title">{t.heroTitle[0]}<br/>{t.heroTitle[1]}</h1></Reveal>
      <Reveal delay={2}><p className="hero-sub">{t.heroSub}</p></Reveal>
      <Reveal delay={3}><p className="hero-meta">{t.heroMeta}</p></Reveal>
      <div className="hero-line"></div>
    </section>

    {/* S1 */}
    <section className="content-section" id="sec-1" aria-label={t.s1.title}>
      <Reveal><div className="section-divider"></div></Reveal>
      <Reveal><div className="section-tag">{t.s1.tag}</div></Reveal>
      <Reveal delay={1}><h2 className="section-title">{t.s1.title}</h2></Reveal>
      <div className="stat-grid">
        {t.s1.stats.map((s,i) => (
          <Reveal key={i} delay={i}><div className={`stat-card stat-card--${s.c}`}>
            {s.fixed ? <div className="stat-num" style={{fontSize:'clamp(2rem,3.8vw,3.2rem)'}}>{s.fixed}</div>
              : <div className="stat-num"><Counter end={s.v} suffix={s.s}/></div>}
            <div className="stat-label">{s.l}</div>
          </div></Reveal>
        ))}
      </div>
      <Reveal><div className="section-body"><Html html={t.s1.body}/></div></Reveal>
      <Reveal><div className="src-line">{t.s1.src}</div></Reveal>
    </section>
    <div className="section-sep"><div className="section-sep-line"></div></div>

    {/* S2 */}
    <section className="content-section" id="sec-2" aria-label={t.s2.title}>
      <Reveal><div className="section-divider"></div></Reveal>
      <Reveal><div className="section-tag">{t.s2.tag}</div></Reveal>
      <Reveal delay={1}><h2 className="section-title">{t.s2.title}</h2></Reveal>
      <Reveal><div className="section-body"><Html html={t.s2.body1}/></div></Reveal>
      <div className="stat-grid">
        {t.s2.stats.map((s,i) => (
          <Reveal key={i} delay={i}><div className={`stat-card stat-card--${s.c}`}>
            <div className="stat-num"><Counter end={s.v} suffix={s.s}/></div>
            <div className="stat-label">{s.l}</div>
          </div></Reveal>
        ))}
      </div>
      <Reveal><div className="section-body"><Html html={t.s2.body2}/></div></Reveal>
      <Reveal><div className="key-message">{t.s2.keyMsg}</div></Reveal>
      <Reveal><div className="src-line">{t.s2.src}</div></Reveal>
    </section>
    <div className="section-sep"><div className="section-sep-line"></div></div>

    {/* S3 — HIGHLIGHT full-width band with side-by-side */}
    <section className="section--highlight" id="sec-3" aria-label={t.s3.title}>
      <div className="content-inner">
        <Reveal><div className="section-divider"></div></Reveal>
        <Reveal><div className="section-tag">{t.s3.tag}</div></Reveal>
        <Reveal delay={1}><h2 className="section-title">{t.s3.title}</h2></Reveal>
        <div className="split">
          <Reveal><div>
            {t.s3.stats.map((s,i) => (
              <div key={i} className={`stat-card stat-card--${s.c}`} style={{marginBottom:16}}>
                <div className="stat-num"><Counter end={s.v} suffix={s.s}/></div>
                <div className="stat-label">{s.l}</div>
              </div>
            ))}
          </div></Reveal>
          <Reveal delay={1}><div className="section-body"><Html html={t.s3.body}/></div></Reveal>
        </div>
        <Reveal><div className="key-message">{t.s3.keyMsg}</div></Reveal>
        <Reveal><div className="src-line">{t.s3.src}</div></Reveal>
      </div>
    </section>

    {/* S4 — with tooltips + split layout */}
    <section className="content-section" id="sec-4" aria-label={t.s4.title}>
      <Reveal><div className="section-divider"></div></Reveal>
      <Reveal><div className="section-tag">{t.s4.tag}</div></Reveal>
      <Reveal delay={1}><h2 className="section-title">{t.s4.title}</h2></Reveal>
      <div className="split">
        <div className="info-grid" style={{gridTemplateColumns:'1fr'}}>
          {t.s4.grid.map((g,i) => (
            <Reveal key={i} delay={i}><div className="info-cell">
              <div className="info-cell-label">{g.lb}</div>
              <div className="info-cell-value">
                {g.tip ? <>{g.pre}<Tip term={g.tip} lang={lang}><strong>{g.tipLabel}</strong></Tip>{g.post}</>
                  : <Html html={g.vl}/>}
              </div>
            </div></Reveal>
          ))}
        </div>
        <Reveal delay={2}><div className="section-body">
          <Html html={t.s4.body}/>
        </div></Reveal>
      </div>
      <Reveal><div className="src-line">{t.s4.src}</div></Reveal>
    </section>
    <div className="section-sep"><div className="section-sep-line"></div></div>

    {/* S5 */}
    <section className="content-section" id="sec-5" aria-label={t.s5.title}>
      <Reveal><div className="section-divider"></div></Reveal>
      <Reveal><div className="section-tag">{t.s5.tag}</div></Reveal>
      <Reveal delay={1}><h2 className="section-title">{t.s5.title}</h2></Reveal>
      <div className="duo-grid">
        <Reveal><div className="duo-card duo-card--stop">
          <h3>{t.s5.stop.h}</h3>
          <ul className="duo-list">{t.s5.stop.items.map((it,i)=><li key={i}><Html html={it}/></li>)}</ul>
        </div></Reveal>
        <Reveal delay={1}><div className="duo-card duo-card--go">
          <h3>{t.s5.go.h}</h3>
          <ul className="duo-list">{t.s5.go.items.map((it,i)=><li key={i}><Html html={it}/></li>)}</ul>
        </div></Reveal>
      </div>
      <Reveal><div className="key-message">{t.s5.keyMsg}</div></Reveal>
      <Reveal><div className="src-line">{t.s5.src}</div></Reveal>
    </section>
    <div className="section-sep"><div className="section-sep-line"></div></div>

    {/* S6 — horizontal comparison (alternate layout from S5) */}
    <section className="content-section" id="sec-6" aria-label={t.s6.title}>
      <Reveal><div className="section-divider"></div></Reveal>
      <Reveal><div className="section-tag">{t.s6.tag}</div></Reveal>
      <Reveal delay={1}><h2 className="section-title">{t.s6.title}</h2></Reveal>
      <div className="compare-stack">
        <Reveal><div className="compare-row compare-row--stop">
          <div className="compare-label">{t.s6.stop.h.replace(/^[^\s]+\s/,'')}</div>
          <div className="compare-content">
            <ul>{t.s6.stop.items.map((it,i)=><li key={i}><Html html={it}/></li>)}</ul>
          </div>
        </div></Reveal>
        <Reveal delay={1}><div className="compare-row compare-row--go">
          <div className="compare-label">{t.s6.go.h.replace(/^[^\s]+\s/,'')}</div>
          <div className="compare-content">
            <ul>{t.s6.go.items.map((it,i)=><li key={i}><Html html={it}/></li>)}</ul>
          </div>
        </div></Reveal>
      </div>
      {t.s6.body && <Reveal><div className="section-body"><Html html={t.s6.body}/></div></Reveal>}
      <Reveal><div className="key-message">{t.s6.keyMsg}</div></Reveal>
      <Reveal><div className="src-line">{t.s6.src}</div></Reveal>
    </section>
    <div className="section-sep"><div className="section-sep-line"></div></div>

    {/* S7 */}
    <section className="content-section" id="sec-7" aria-label={t.s7.title}>
      <Reveal><div className="section-divider"></div></Reveal>
      <Reveal><div className="section-tag">{t.s7.tag}</div></Reveal>
      <Reveal delay={1}><h2 className="section-title">{t.s7.title}</h2></Reveal>
      <Reveal><div className="section-body"><Html html={t.s7.body}/></div></Reveal>
      <div className="stat-grid">
        {t.s7.stats.map((s,i) => (
          <Reveal key={i} delay={i}><div className={`stat-card stat-card--${s.c}`}>
            <div className="stat-num"><Counter end={s.v} suffix={s.s} unit={s.unit||''}/></div>
            <div className="stat-label">{s.l}</div>
          </div></Reveal>
        ))}
      </div>
      <Reveal><div className="key-message">{t.s7.keyMsg}</div></Reveal>
      <Reveal><div className="src-line">{t.s7.src}</div></Reveal>
    </section>
    <div className="section-sep"><div className="section-sep-line"></div></div>

    {/* S8 */}
    <section className="content-section" id="sec-8" aria-label={t.s8.title}>
      <Reveal><div className="section-divider"></div></Reveal>
      <Reveal><div className="section-tag">{t.s8.tag}</div></Reveal>
      <Reveal delay={1}><h2 className="section-title">{t.s8.title}</h2></Reveal>
      <div className="takeaway-list">
        {t.s8.items.map((item,i) => (
          <Reveal key={i} delay={Math.min(i,4)}>
            <div className="takeaway-card">
              <div className="takeaway-num">{i+1}</div>
              <div><h3>{item.t}</h3><p>{item.d}</p></div>
            </div>
          </Reveal>
        ))}
      </div>
    </section>

    {/* Closing */}
    <section className="closing-section" aria-label="closing">
      <Reveal><p className="closing-text">
        {t.closing[0]}<br/>{t.closing[1]}<span className="hl">{t.closing[2]}</span>{t.closing[3]}
      </p></Reveal>
      <Reveal delay={1}><p className="closing-src">Gartner CIO Leadership Forum 2026 · Opening Keynote</p></Reveal>
    </section>

    </main>
    <footer className="site-footer">{t.footer}</footer>

    <BackToTop show={showTop} behavior={scrollBehavior} />
    <div className={`kbd-hint ${showKbd ? 'show' : ''}`}>
      <kbd>{'\u2191'}</kbd> <kbd>{'\u2193'}</kbd> or <kbd>j</kbd> <kbd>k</kbd> to navigate
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
